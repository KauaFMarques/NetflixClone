<ion-header>
  <ion-toolbar>
    <ion-title>
      <span style="color:#E50914;font-weight:700;letter-spacing:2px">BUSCAR</span>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- BARRA DE BUSCA -->
  <div class="search-wrap">
    <ion-searchbar
      placeholder="Buscar filmes..."
      debounce="400"
      (ionInput)="buscar($event)"
      (ionClear)="limpar()"
      color="dark">
    </ion-searchbar>
  </div>

  <!-- SPINNER -->
  <div *ngIf="buscando" class="center">
    <ion-spinner color="danger"></ion-spinner>
  </div>

  <!-- SEM RESULTADOS -->
  <div *ngIf="semResultados" class="center">
    <ion-icon name="search-outline" style="font-size:48px;color:#555"></ion-icon>
    <p style="color:#888;margin-top:12px">Nenhum filme encontrado</p>
  </div>

  <!-- RESULTADOS DA BUSCA -->
  <div *ngIf="resultados.length > 0">
    <p class="section-label">{{ resultados.length }} resultado(s)</p>
    <div class="result-list">
      <div
        class="result-card"
        *ngFor="let movie of resultados"
        (click)="abrirDetalhe(movie.id)">
        <img [src]="getPoster(movie.poster_path)" class="result-poster" />
        <div class="result-info">
          <p class="result-title">{{ movie.title }}</p>
          <p class="result-ano">{{ getAno(movie.release_date) }}</p>
          <p class="result-overview">{{ movie.overview | slice:0:100 }}...</p>
          <div class="result-nota">
            <ion-icon name="star" color="warning" style="font-size:13px"></ion-icon>
            {{ movie.vote_average | number:'1.1-1' }}
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SUGESTÕES (quando não está buscando) -->
  <div *ngIf="resultados.length === 0 && !buscando && !semResultados">
    <p class="section-label">🎬 Populares agora</p>
    <div class="poster-grid">
      <div
        class="grid-card"
        *ngFor="let movie of populares"
        (click)="abrirDetalhe(movie.id)">
        <img [src]="getPoster(movie.poster_path)" [alt]="movie.title" />
        <p class="grid-title">{{ movie.title }}</p>
      </div>
    </div>
  </div>

</ion-content>
